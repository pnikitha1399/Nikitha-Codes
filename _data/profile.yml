bio: |
  Hi — I'm Nikitha. Data Scientist working on LLM applications, ML systems, and production AI workflows. Currently focused on building and optimizing GenAI pipelines using tools like LangGraph, LangChain and FastAPI — from evaluation and monitoring to deployment and performance optimization.

  My interest in data science grew during my Masters at the University of Texas at Arlington, where I researched transformer architectures for space weather prediction. Since then, I have been especially drawn to problems that combine engineering, experimentation, and real-world impact.

  When I'm not wrangling data, I write a blog called <em>A Little Page from My Notes</em> — a quiet corner of the internet for half-formed thoughts and things I'm learning.

