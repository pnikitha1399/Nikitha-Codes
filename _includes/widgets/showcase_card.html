<div class="card p-4 mb-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div class="section-heading mb-0">Projects</div>
    <a href="{{ '/showcase' | relative_url }}" class="text-primary" style="font-size:0.82rem;">View all →</a>
  </div>
  <div class="row g-3">
    {% assign showcase_items = site.showcase | sort: "date" | reverse | where: "show", true %}
    {% for item in showcase_items limit: include.limit %}
    <div class="col-12">
      <div class="showcase-card card p-3">
        <div class="card-title">{{ item.title }}</div>
        <p class="card-text">{{ item.description }}</p>
        <div>
          {% for tag in item.tags %}
          <span class="tag">{{ tag }}</span>
          {% endfor %}
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
