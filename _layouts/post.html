---
layout: default
---

<div class="row justify-content-center">
  <div class="col-md-8">

    <div class="mb-3">
      <a href="{{ '/blog' | relative_url }}" class="text-muted" style="font-size:0.85rem; text-decoration:none;">
        ← Back to blog
      </a>
    </div>

    <div class="card p-4 p-md-5">
      <div class="mb-4">
        <h1 style="font-size:1.5rem; font-weight:600; line-height:1.3; margin-bottom:0.5rem;">{{ page.title }}</h1>
        <div style="font-size:0.82rem; color:#888;">
          {{ page.date | date: "%B %d, %Y" }}
          {% if page.tags %}
          &nbsp;&middot;&nbsp;
          {% for tag in page.tags %}
          <span class="tag">{{ tag }}</span>
          {% endfor %}
          {% endif %}
        </div>
      </div>

      <div class="post-body">
        {{ content }}
      </div>
    </div>

  </div>
</div>

<style>
.post-body {
  font-size: 0.97rem;
  line-height: 1.85;
  color: #333;
}
.post-body p {
  margin-bottom: 1.35rem;
}
.post-body p:last-child {
  margin-bottom: 0;
}
.post-body h2 {
  font-size: 1.1rem;
  font-weight: 600;
  margin: 2rem 0 0.75rem;
}
.post-body h3 {
  font-size: 1rem;
  font-weight: 600;
  margin: 1.5rem 0 0.5rem;
}
.post-body blockquote {
  border-left: 3px solid #4a90d9;
  margin: 1.5rem 0;
  padding: 0.5rem 0 0.5rem 1.25rem;
  color: #555;
  font-style: italic;
}
.post-body code {
  background: #f4f5f7;
  padding: 0.15rem 0.4rem;
  border-radius: 4px;
  font-size: 0.88em;
}
.post-body a {
  color: #4a90d9;
}
</style>
