<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>{{ page.title }} - {{ site.data.profile.name }}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-md navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="{{ '/' | relative_url }}">{{ site.data.profile.name }}</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          {% for item in site.data.display.navbar %}
          <li class="nav-item">
            <a class="nav-link{% if page.url == item.url %} active fw-semibold{% endif %}" href="{{ item.url | relative_url }}">{{ item.title }}</a>
          </li>
          {% endfor %}
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="container{% if page.container_class %} {{ page.container_class }}{% endif %} py-4">
    {{ content }}
  </main>

  <!-- Footer -->
  <footer class="footer mt-auto py-3 bg-white border-top">
    <div class="container text-center text-muted small">
      <span>© {{ 'now' | date: "%Y" }} {{ site.data.profile.name }} &mdash; Built with the <a href="https://github.com/luost26/academic-homepage" target="_blank" class="text-muted">academic-homepage</a> template.</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
